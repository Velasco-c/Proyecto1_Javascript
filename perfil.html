<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil || Campus land</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/perfil.css">
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <div class="iconos">
                    <h1 class="logo" id="Bienvenido">CampusParking</h1>
                </div>
            </div>

            <div class="iconos-sociales">
                <a href=""><img src="./imagenes/iconos/github.svg" alt="github"></a>
                <a href=""><img src="./imagenes/iconos/facebook.svg" alt="facebook"></a>
                <a href=""><img src="./imagenes/iconos/linkedin.svg" alt="linkedin"></a>
            </div>
        </nav>
    </header>

    <main class="perfil-container">
        <section class="perfil-header-card">
            <div class="avatar-container">
                <img src="./imagenes/iconos/user.svg" alt="Foto de perfil" class="avatar-img">
            </div>
            <div class="user-info">
                <h2 id="user-name"></h2>
                <p id="user-email"></p>
            </div>
        </section>

        <section class="perfil-section-full">
            <article class="card-option btn-modificar">
                <h3>Modificar Datos</h3>
                <p>Actualiza tu nombre de usuario y contraseña</p>
                <button type="button" id="btn-abrir-modificar">Editar Perfil</button>
            </article>
        </section>

        <section class="perfil-grid-two-columns">
            <article class="card-option card-pagos">
                <div class="card-icon">💰</div>
                <h3>Ganancias Totales</h3>
                <p class="stat-value" id="ganancias"></p>
            </article>

            <article class="card-option card-espacios">
                <div class="card-icon">🅿️</div>
                <h3>Espacios ocupados</h3>
                <p class="stat-value" id="espacios"></p>
            </article>

        </section>

        <section class="perfil-actions">
            <a href="./index.html" class="btn-nav btn-regresar">Volver al Inicio</a>
            <a class="btn-nav btn-regresar" id="cerrarSesion">Cerra sesión</a>
        </section>

    </main>
    <div id="modal-registro" class="modal-overlay">
        <div class="modal-content-crystal">
            <div class="modal-header">
                <h3>Modificar Datos</h3>
                <p>Actualiza tus credenciales de acceso</p>
            </div>

            <form id="form-registro">
                <div class="input-group">
                    <label for="new-username">Nuevo Nombre de Usuario</label>
                    <input type="text" id="new-username" placeholder="Ingresa tu nuevo usuario" required>
                </div>
                <div class="input-group">
                    <label for="new-password">Nueva Contraseña</label>
                    <input type="password" id="new-password" placeholder="Ingresa tu nueva contraseña" required>
                </div>

                <div class="form-buttons">
                    <button type="submit" class="btn-neon-save">Guardar Cambios</button>
                    <button type="button" id="btn-cerrar-registro" class="btn-neon-cancel">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="./javascript/perfil.js"></script>buttaon
    <script src="./javascript/Validacion.js"></script>
</body>

</html>
