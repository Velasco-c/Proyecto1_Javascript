<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login || Campus land</title>
    <link rel="stylesheet" href="/css//style.css">
    <link rel="stylesheet" href="/css/login.css">
</head>

<body>


    <main class="main-login">
        <div class="container-login">
            <div class="iconos">
                <img src="/imagenes/iconos/user.svg" alt="user-icon">
            </div>
            <div class="informacion">
                <p>Inicia sesión para acceder a tu cuenta y disfrutar de todos los beneficios que ofrecemos.</p>
                <form action="index.html" method="post" class="formulario-login" id="formulario-login">
                    <input type="email" placeholder="example@gmail.com" id="email" required>
                    <input type="password" placeholder="enter password" id="password" required>
                    <p>
                        ¿No tienes cuenta? <a href="#" id="btn-abrir-registro"
                            style="color: #fff; font-weight: bold;">Regístrate aquí</a>
                    </p>
                    <button type="submit">Iniciar Sesión</button>
                </form>
            </div>
        </div>

        <!-- El modal se mantiene con la misma jerarquía estructural -->
        <div class="contenedor-modal" id="modal-registro">
            <form id="form-registro" class="modal-content">
                <h2>Crear Cuenta</h2>
                <input type="text" id="username" placeholder="Nombre de Usuario" required>
                <input type="text" id="email" placeholder="Correo Electrónico" required>
                <input type="password" id="password" placeholder="Contraseña" required>
                <div class="modal_botones">
                    <button type="button" id="btn-cerrar-registro">Cancelar</button>
                    <button type="submit">Registrar</button>
                </div>
            </form>
        </div>
    </main>
    <script src="/javascript/login.js"></script>

</body>

</html>
