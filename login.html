<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login || Campus land</title>
    <link rel="stylesheet" href="/css//style.css">
</head>

<body>


    <main class="main-login">
        <div class="container">
            <div class="iconos">
                <img src="/imagenes/iconos/user.svg" alt="user-icon">
            </div>
            <div class="informacion">
                <p>Inicia sesión para acceder a tu cuenta y disfrutar de todos los beneficios que ofrecemos.</p>
                <form action="index.html" method="post" class="formulario-login">
                    <input type="email" placeholder="example@gmail.com" required>
                    <input type="password" placeholder="enter password" required>
                    <button type="submit">Iniciar Sesión</button>
                </form>
            </div>
        </div>
    </main>


</body>

</html>
